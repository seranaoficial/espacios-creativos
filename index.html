<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Click</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="card">
    <h1>Color Click</h1>
    <p class="hint">Toca el botón para cambiar el color del fondo.</p>
    <button id="color-btn" type="button" aria-label="Cambiar color">
      <span>Cambiar color</span>
    </button>
    <p class="readout">
      Color actual: <code id="color-readout">#fefadf</code>
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
